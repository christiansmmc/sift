name: Release

# Builds installers for Windows and Linux and publishes them to a GitHub
# Release whenever a version tag (e.g. v0.1.3) is pushed.
#
#   git tag v0.1.3
#   git push origin v0.1.3
#
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest # -> .exe (NSIS) + .msi
            args: ""
          - platform: ubuntu-22.04 # -> .AppImage + .deb (older glibc = wider compat)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sift ${{ github.ref_name }}"
          releaseBody: "Download an installer for your platform from the assets below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
